name: Release

# Manual only. Auto-building on every version tag spammed failure mails
# (electron-builder's "dir" target + winCodeSign quirks). Releases are cut
# locally with `npm run installer:win` (Inno Setup) and published with the
# gh CLI. Trigger this from the Actions tab if you ever want the CI build.
on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*.exe
          generate_release_notes: true
          body: |
            ## PresentOtter ${{ github.ref_name }} 🦦

            ### Installation
            Télécharge `PresentOtter-Setup-*.exe` et lance l'installeur.

            ### Changelog
