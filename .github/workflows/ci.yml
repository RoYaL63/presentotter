name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  unit-tests:
    runs-on: windows-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage
      - name: Coverage check
        run: |
          node -e "const c = require('./coverage/coverage-summary.json'); const pct = c.total.lines.pct; if(pct < 70) { console.error('Coverage ' + pct + '% < 70%'); process.exit(1); }"

  gate-check:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check gates status
        run: |
          python3 scripts/check_gates.py
      - name: Comment PR with gates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const gates = fs.readFileSync('GATES.md', 'utf8')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Gates Status\n\n' + gates
            })

  build-electron:
    runs-on: windows-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: presentotter-installer
          path: release/*.exe
          retention-days: 30
