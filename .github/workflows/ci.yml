name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Manual trigger only for the heavy installer build (see build-electron).
  workflow_dispatch:

jobs:
  lint-typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  unit-tests:
    runs-on: windows-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage
      - name: Coverage check
        run: |
          node -e "const c = require('./coverage/coverage-summary.json'); const pct = c.total.lines.pct; if(pct < 70) { console.error('Coverage ' + pct + '% < 70%'); process.exit(1); }"

  gate-check:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    # The default GITHUB_TOKEN is read-only on PRs; grant write so the
    # status comment can be posted. Without this the createComment call
    # failed with "Resource not accessible by integration" and the whole
    # job went red.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check gates status
        run: |
          python3 scripts/check_gates.py
      - name: Comment PR with gates
        uses: actions/github-script@v7
        # Best-effort: a failed comment (e.g. fork PR with a read-only
        # token) must not fail the gate-check job.
        continue-on-error: true
        with:
          script: |
            const fs = require('fs')
            const gates = fs.readFileSync('GATES.md', 'utf8')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Gates Status\n\n' + gates
            })

  build-electron:
    runs-on: windows-latest
    needs: unit-tests
    # MANUAL only. Building the installer on every push to main spammed
    # failure mails (and is redundant with the Release workflow that builds
    # on version tags). Trigger from the Actions tab when needed.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: presentotter-installer
          path: release/*.exe
          retention-days: 30
